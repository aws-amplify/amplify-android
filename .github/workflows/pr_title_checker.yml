# Runs a check to verify PRs have a valid title

name: "PR Title Checker"
on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title format
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Allowed formats from CONTRIBUTING.md:
          #   fix(category): description
          #   feat(category): description
          #   chore: description
          #   refactor: description
          #   perf: description
          #   test: description
          #   docs: description
          #   release: description
          CATEGORIES="all|analytics|api|auth|core|datastore|geo|kinesis|predictions|storage|notifications|apollo"
          PATTERN="^((fix|feat)\(($CATEGORIES)\): .+|(chore|refactor|perf|test|docs|release): .+)$"

          if echo "$PR_TITLE" | grep -Eq "$PATTERN"; then
            echo "✅ PR title is valid: $PR_TITLE"
          else
            echo "❌ PR title does not match the required format: $PR_TITLE"
            echo ""
            echo "Expected one of:"
            echo "  fix(category): description"
            echo "  feat(category): description"
            echo "  chore: description"
            echo "  refactor: description"
            echo "  perf: description"
            echo "  test: description"
            echo "  docs: description"
            echo "  release: description"
            echo ""
            echo "Valid categories: $CATEGORIES"
            echo ""
            echo "See: https://github.com/aws-amplify/amplify-android/blob/main/CONTRIBUTING.md#pull-request-guidelines"
            exit 1
          fi
